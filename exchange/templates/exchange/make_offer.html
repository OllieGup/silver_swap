{% extends 'base.html' %}

{% block content %}
<h1>Make an Offer on "{{ listing.title }}"</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Offer</button>
</form>

<p><a href="{% url 'listing_detail' listing.id %}">Back to Listing</a></p>
{% endblock %}
